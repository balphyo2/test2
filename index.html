<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운암고등학교 - 글쓰기 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #f8fafc; }
    </style>
</head>
<body>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm"></div>
        
        <div class="relative w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
            
            <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 bg-white sticky top-0">
                <div class="flex items-center gap-2">
                    <h2 class="text-xl font-bold text-slate-800">새 글 작성</h2>
                    <span class="bg-indigo-100 text-indigo-600 text-xs font-bold px-2 py-1 rounded-full">선생님</span>
                </div>
                <button class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>

            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">카테고리</label>
                    <div class="flex gap-2">
                        <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium">자유게시판</button>
                        <button class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-200">과목별 게시판</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">제목</label>
                    <input type="text" placeholder="제목을 입력하세요" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                </div>

                <div class="flex items-center gap-2 p-2 bg-slate-50 border border-b-0 border-slate-200 rounded-t-xl">
                    <button class="p-2 hover:bg-white rounded text-slate-500"><i data-lucide="bold" class="w-4 h-4"></i></button>
                    <button class="p-2 hover:bg-white rounded text-slate-500"><i data-lucide="italic" class="w-4 h-4"></i></button>
                    <button class="p-2 hover:bg-white rounded text-slate-500"><i data-lucide="image" class="w-4 h-4"></i></button>
                    <button class="p-2 hover:bg-white rounded text-slate-500"><i data-lucide="link" class="w-4 h-4"></i></button>
                </div>

                <textarea placeholder="내용을 입력하세요..." class="w-full h-48 px-4 py-3 border border-slate-200 rounded-b-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all resize-none"></textarea>

                <div class="flex items-center justify-between p-4 bg-indigo-50 border border-indigo-100 rounded-xl">
                    <div class="flex items-center gap-3">
                        <i data-lucide="megaphone" class="text-indigo-600"></i>
                        <div>
                            <p class="text-sm font-bold text-slate-800">공지사항으로 등록</p>
                            <p class="text-xs text-indigo-600/70">게시글이 상단에 고정됩니다</p>
                        </div>
                    </div>
                    <div class="w-12 h-6 bg-indigo-600 rounded-full relative">
                        <div class="absolute right-1 top-1 w-4 h-4 bg-white rounded-full shadow-sm"></div>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button class="flex-1 py-3 border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-slate-50">취소</button>
                    <button class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 아이콘 실행 코드
        lucide.createIcons();
    </script>
</body>
</html>
